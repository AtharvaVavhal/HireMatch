<!DOCTYPE html>
<html>
<head><title>Visualize Rankings</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 60px auto; }
  textarea { width: 100%; height: 150px; }
  button { margin-top: 12px; padding: 10px 24px; background: #4F8EF7;
           color: white; border: none; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>
  <h2>📊 Visualize Resume Rankings</h2>
  <form method="POST" enctype="multipart/form-data">
    <p><label><b>Upload Resumes (PDF, multiple allowed):</b></label><br>
    <input type="file" name="resumes[]" accept=".pdf" multiple required></p>
    <p><label><b>Job Description:</b></label><br>
    <textarea name="jd_text" placeholder="Paste job description here..." required></textarea></p>
    <button type="submit">Generate Charts</button>
  </form>
</body>
</html>
